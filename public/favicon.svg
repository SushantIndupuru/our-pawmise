<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <title>Our Pawmise</title>
  <defs>
    <linearGradient id="fg" x1="4" y1="4" x2="76" y2="76" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d4775d"/>
      <stop offset="1" stop-color="#a04830"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect x="2" y="2" width="76" height="76" rx="19" fill="url(#fg)"/>
  <!-- Paw shapes in white — mirroring user's 5-ellipse layout, scaled to fit 80×80 -->
  <g fill="white" fill-opacity=".93" transform="translate(-9 -7) scale(0.935)">
    <ellipse cx="56" cy="74" rx="22" ry="18"/>
    <ellipse cx="24" cy="48" rx="9" ry="12" transform="rotate(-30 24 48)"/>
    <ellipse cx="43" cy="30" rx="9" ry="12" transform="rotate(-10 43 30)"/>
    <ellipse cx="62" cy="28" rx="9" ry="12" transform="rotate(8 62 28)"/>
    <ellipse cx="82" cy="44" rx="9" ry="12" transform="rotate(28 82 44)"/>
  </g>
</svg>
